kind = "web"
previewPath = "/"
title = "Happy Birthday Mahi ❤️"
version = "1.0.0"
id = "artifacts/mahi-birthday"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19236

[services.development]
run = "pnpm --filter @workspace/mahi-birthday run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mahi-birthday", "run", "build" ]
publicDir = "artifacts/mahi-birthday/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19236"
BASE_PATH = "/"
